# Anki Lyrics Deck Configuration

# File name of the source data (located inside the data folder)
# CSV format: japanese_line, english_translation
src_filename: source.txt

# Model name
anki_model_name: "Japanese Lyrics Model"

# CSS styling for each card
Style: "
.card {
  font-family: 'MS PMincho', serif;
  font-size: 22px;
  color: #BDC7C1;
  text-align: center;
  background-color: #272828;
}
.japanese {
  font-size: 32px;
  color: #e48872;
  padding: 20px 10px;
}
.english {
  font-size: 18px;
  color: #BDC7C1;
  padding: 10px;
  font-style: italic;
}
iframe {
  width: 100%;
  height: 500px;
  border: none;
  background: white;
  margin-top: 10px;
}
"
